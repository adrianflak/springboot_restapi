          # ssh-keyscan github.com >> ~/.ssh/known_hosts
          # chmod 700 ~/.ssh
          # chmod 644 ~/.ssh/known_hosts
        
      - name: Executing remote ssh commands using password
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            ls -lah

            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts
            chmod 700 ~/.ssh
            chmod 644 ~/.ssh/known_hosts
            
            cd ~            
            if [ ! -d "springboot_restapi/.git" ]; then
              git clone git@github.com:adrianflak/springboot_restapi.git
            else
              echo "Repozytorium istnieje, wykonuje git pull"
              cd springboot_restapi
              git pull origin main
              cd ..
            fi
            
            ls -la
            sudo apt install node npm -y
            cd backend
            mvn clean package
            sudo socker build --rm -t spring-mongodb-image -f Dockerfile .
            cd ..
            sudo docker-compose down
            sudo docker-compose up -d --build
            cd springboot_restapi/frontend
            npm run serve

            
